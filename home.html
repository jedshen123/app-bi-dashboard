<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momcozy数据平台</title>
  <style>
    :root {
      --ink: #2e3846;
      --muted: #7b8794;
      --line: #763f4b;
      --card: #ffffff;
      --border: #d9dde3;
      --shadow: 0 18px 42px rgba(28, 35, 45, .10);
      --page: #fafbfc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      color: var(--ink);
      background: var(--page);
      overflow: hidden;
    }

    .home {
      min-height: 100vh;
      padding: 56px 48px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .home-content {
      width: min(100%, 1120px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .greeting {
      display: flex;
      align-items: center;
      gap: 26px;
      justify-content: center;
      margin-bottom: 68px;
    }

    .hello-icon {
      position: relative;
      width: 86px;
      height: 64px;
      border: 3px solid var(--line);
      border-radius: 8px;
      color: var(--line);
      flex: 0 0 auto;
    }

    .hello-icon::before {
      content: '';
      position: absolute;
      left: 10px;
      right: 10px;
      top: 12px;
      height: 32px;
      border: 2px solid currentColor;
      border-radius: 4px;
    }

    .hello-icon::after {
      content: '';
      position: absolute;
      right: 10px;
      bottom: 5px;
      width: 16px;
      height: 7px;
      border-right: 2px solid currentColor;
      border-left: 2px solid currentColor;
    }

    .face {
      position: absolute;
      left: 28px;
      top: 24px;
      width: 28px;
      height: 10px;
      border-bottom: 2px solid currentColor;
      border-radius: 0 0 18px 18px;
    }

    .face::before,
    .face::after {
      content: '';
      position: absolute;
      top: -8px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
    }

    .face::before { left: 2px; }
    .face::after { right: 2px; }

    .greeting h1 {
      font-size: 28px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0;
    }

    .section-title {
      margin-bottom: 34px;
      color: #657382;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 0;
      text-align: center;
    }

    .dashboard-links {
      display: flex;
      align-items: stretch;
      justify-content: center;
      flex-wrap: wrap;
      gap: 28px;
      max-width: 1120px;
    }

    .dashboard-card {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 280px;
      min-height: 102px;
      padding: 28px 22px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--ink);
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .dashboard-card:hover {
      transform: translateY(-2px);
      border-color: rgba(118, 63, 75, .38);
      box-shadow: 0 22px 52px rgba(28, 35, 45, .14);
    }

    .dashboard-card:focus-visible {
      outline: 3px solid rgba(118, 63, 75, .28);
      outline-offset: 4px;
    }

    .card-icon {
      position: relative;
      width: 20px;
      height: 20px;
      border: 2px solid var(--line);
      border-radius: 3px;
      flex: 0 0 auto;
    }

    .card-icon::before,
    .card-icon::after {
      content: '';
      position: absolute;
      left: 4px;
      right: 4px;
      height: 2px;
      border-radius: 99px;
      background: var(--line);
    }

    .card-icon::before { top: 5px; }
    .card-icon::after { top: 11px; }

    .card-title {
      font-size: 20px;
      line-height: 1.25;
      font-weight: 800;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .home { padding: 44px 24px; overflow: hidden; }
      .greeting {
        gap: 18px;
        margin-bottom: 44px;
      }
      .greeting h1 { font-size: 24px; }
      .section-title { font-size: 18px; margin-bottom: 22px; }
      .dashboard-links { gap: 18px; }
      .dashboard-card {
        width: min(100%, 420px);
        min-height: 86px;
        padding: 24px 28px;
      }
      .card-title { white-space: normal; font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="home">
    <div class="home-content">
      <section class="greeting" aria-label="欢迎">
        <div class="hello-icon" aria-hidden="true"><span class="face"></span></div>
        <h1 id="greeting-title">您好，欢迎回来</h1>
      </section>

      <section aria-labelledby="continue-title">
        <h2 class="section-title" id="continue-title">从你离开的地方继续</h2>
        <div class="dashboard-links">
          <a class="dashboard-card" href="/dashboard-v2" data-src="/dashboard-v2">
            <span class="card-icon" aria-hidden="true"></span>
            <span class="card-title">AI吸乳计划分析</span>
          </a>
          <a class="dashboard-card" href="/pump" data-src="/pump">
            <span class="card-icon" aria-hidden="true"></span>
            <span class="card-title">吸奶器用户行为分析</span>
          </a>
          <a class="dashboard-card" href="/firmware" data-src="/firmware">
            <span class="card-icon" aria-hidden="true"></span>
            <span class="card-title">智能设备固件版本统计</span>
          </a>
        </div>
      </section>
    </div>
  </main>

  <script>
    async function loadGreeting() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) return;
        const data = await res.json();
        const name = data.first_name || data.email || '';
        if (name) {
          document.getElementById('greeting-title').textContent = `您好，${name}`;
        }
      } catch (_) {}
    }

    document.querySelectorAll('.dashboard-card').forEach(card => {
      card.addEventListener('click', event => {
        const src = card.dataset.src;
        if (!src || window.parent === window) return;
        event.preventDefault();
        window.parent.postMessage({ type: 'momcozy-open-dashboard', src }, '*');
      });
    });

    loadGreeting();
  </script>
</body>
</html>
