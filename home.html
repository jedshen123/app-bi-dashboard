<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momcozy数据平台</title>
  <style>
    :root {
      --ink: #2e3846;
      --muted: #7b8794;
      --line: #763f4b;
      --line-soft: rgba(118, 63, 75, .12);
      --card: #ffffff;
      --border: #d9dde3;
      --shadow: 0 18px 42px rgba(28, 35, 45, .10);
      --page: #fafbfc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      color: var(--ink);
      background: var(--page);
      overflow: hidden;
    }

    .home {
      position: relative;
      min-height: 100vh;
      padding: 76px 48px 170px;
      overflow: hidden;
    }

    .greeting {
      display: flex;
      align-items: center;
      gap: 26px;
      margin-bottom: 132px;
    }

    .hello-icon {
      position: relative;
      width: 86px;
      height: 64px;
      border: 3px solid var(--line);
      border-radius: 8px;
      color: var(--line);
      flex: 0 0 auto;
    }

    .hello-icon::before {
      content: '';
      position: absolute;
      left: 10px;
      right: 10px;
      top: 12px;
      height: 32px;
      border: 2px solid currentColor;
      border-radius: 4px;
    }

    .hello-icon::after {
      content: '';
      position: absolute;
      right: 10px;
      bottom: 5px;
      width: 16px;
      height: 7px;
      border-right: 2px solid currentColor;
      border-left: 2px solid currentColor;
    }

    .face {
      position: absolute;
      left: 28px;
      top: 24px;
      width: 28px;
      height: 10px;
      border-bottom: 2px solid currentColor;
      border-radius: 0 0 18px 18px;
    }

    .face::before,
    .face::after {
      content: '';
      position: absolute;
      top: -8px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
    }

    .face::before { left: 2px; }
    .face::after { right: 2px; }

    .greeting h1 {
      font-size: 28px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0;
    }

    .section-title {
      margin-bottom: 34px;
      color: #657382;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .dashboard-links {
      display: flex;
      align-items: stretch;
      flex-wrap: wrap;
      gap: 36px;
      max-width: 1120px;
    }

    .dashboard-card {
      display: flex;
      align-items: center;
      gap: 24px;
      min-width: 264px;
      min-height: 102px;
      padding: 28px 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--ink);
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .dashboard-card:hover {
      transform: translateY(-2px);
      border-color: rgba(118, 63, 75, .38);
      box-shadow: 0 22px 52px rgba(28, 35, 45, .14);
    }

    .dashboard-card:focus-visible {
      outline: 3px solid rgba(118, 63, 75, .28);
      outline-offset: 4px;
    }

    .card-icon {
      position: relative;
      width: 20px;
      height: 20px;
      border: 2px solid var(--line);
      border-radius: 3px;
      flex: 0 0 auto;
    }

    .card-icon::before,
    .card-icon::after {
      content: '';
      position: absolute;
      left: 4px;
      right: 4px;
      height: 2px;
      border-radius: 99px;
      background: var(--line);
    }

    .card-icon::before { top: 5px; }
    .card-icon::after { top: 11px; }

    .card-title {
      font-size: 20px;
      line-height: 1.25;
      font-weight: 800;
      white-space: nowrap;
    }

    .landscape {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 198px;
      color: var(--line);
      pointer-events: none;
      opacity: .98;
    }

    .cloud {
      position: absolute;
      height: 38px;
      background:
        radial-gradient(circle at 24px 30px, var(--line-soft) 0 23px, transparent 24px),
        radial-gradient(circle at 70px 20px, var(--line-soft) 0 36px, transparent 37px),
        radial-gradient(circle at 124px 30px, var(--line-soft) 0 22px, transparent 23px);
      border-radius: 999px;
    }

    .cloud.c1 { left: 7%; bottom: 112px; width: 150px; }
    .cloud.c2 { left: 28%; bottom: 196px; width: 118px; }
    .cloud.c3 { right: 28%; bottom: 130px; width: 150px; }

    .landscape svg {
      position: absolute;
      inset: auto 0 0;
      width: 100%;
      height: 170px;
      display: block;
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .home { padding: 44px 24px 140px; overflow: hidden; }
      .greeting {
        gap: 18px;
        margin-bottom: 72px;
      }
      .greeting h1 { font-size: 24px; }
      .section-title { font-size: 18px; margin-bottom: 22px; }
      .dashboard-links { gap: 18px; }
      .dashboard-card {
        width: min(100%, 420px);
        min-height: 86px;
        padding: 24px 28px;
      }
      .card-title { white-space: normal; font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="home">
    <section class="greeting" aria-label="欢迎">
      <div class="hello-icon" aria-hidden="true"><span class="face"></span></div>
      <h1 id="greeting-title">您好，欢迎回来</h1>
    </section>

    <section aria-labelledby="continue-title">
      <h2 class="section-title" id="continue-title">从你离开的地方继续</h2>
      <div class="dashboard-links">
        <a class="dashboard-card" href="/dashboard-v2" data-src="/dashboard-v2">
          <span class="card-icon" aria-hidden="true"></span>
          <span class="card-title">AI吸乳计划分析</span>
        </a>
        <a class="dashboard-card" href="/pump" data-src="/pump">
          <span class="card-icon" aria-hidden="true"></span>
          <span class="card-title">吸奶器用户行为分析</span>
        </a>
        <a class="dashboard-card" href="/firmware" data-src="/firmware">
          <span class="card-icon" aria-hidden="true"></span>
          <span class="card-title">智能设备固件版本统计</span>
        </a>
      </div>
    </section>

    <div class="landscape" aria-hidden="true">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
      <svg viewBox="0 0 1440 170" preserveAspectRatio="none">
        <path d="M0 112 H116 L194 46 L246 112 H330 L430 74 L518 118 L616 56 L720 126 L810 84 L905 126 H1018 L1050 64 L1088 86 L1130 55 L1190 126 H1440" fill="none" stroke="currentColor" stroke-width="2.4" vector-effect="non-scaling-stroke"/>
        <path d="M0 140 H260 L338 170 H1440" fill="none" stroke="currentColor" stroke-width="2.4" vector-effect="non-scaling-stroke"/>
        <path d="M746 126 L780 45 L814 126" fill="none" stroke="currentColor" stroke-width="2.4" vector-effect="non-scaling-stroke"/>
        <path d="M780 45 L792 70 L803 60" fill="none" stroke="currentColor" stroke-width="2.4" vector-effect="non-scaling-stroke"/>
      </svg>
    </div>
  </main>

  <script>
    async function loadGreeting() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) return;
        const data = await res.json();
        const name = data.first_name || data.email || '';
        if (name) {
          document.getElementById('greeting-title').textContent = `您好，${name}`;
        }
      } catch (_) {}
    }

    document.querySelectorAll('.dashboard-card').forEach(card => {
      card.addEventListener('click', event => {
        const src = card.dataset.src;
        if (!src || window.parent === window) return;
        event.preventDefault();
        window.parent.postMessage({ type: 'momcozy-open-dashboard', src }, '*');
      });
    });

    loadGreeting();
  </script>
</body>
</html>
