<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据看板</title>
  <style>
    :root {
      --bg-deep:   #060810;
      --bg-card:   #0f1524;
      --bg-card2:  #141c30;
      --border:    #1e2d48;
      --border-hi: #2a4068;
      --rose:      #ff5c8a;
      --rose-soft: #ff8fab;
      --rose-dim:  #b85a78;
      --cyan:      #00e5ff;
      --cyan-dim:  #00b8d4;
      --violet:    #a78bfa;
      --peach:     #f4b8a8;
      --text-1:    #eef2ff;
      --text-2:    #94a8c8;
      --text-3:    #5a6d8a;
      --glow-rose: rgba(255,92,138,.4);
      --glow-cyan: rgba(0,229,255,.3);
      --sidebar-w: 240px;
      --radius:    12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
    }

    /* ============================================================ iframe */
    #main-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg-deep);
    }

    /* 无法嵌入时的占位提示 */
    #frame-blocked {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 5;
      background: var(--bg-deep);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-2);
    }
    #frame-blocked .fb-icon { font-size: 48px; }
    #frame-blocked .fb-title { font-size: 18px; font-weight: 700; color: var(--text-1); }
    #frame-blocked .fb-desc  { font-size: 13px; color: var(--text-3); text-align: center; line-height: 1.8; }
    #frame-blocked .fb-btn {
      margin-top: 8px;
      padding: 10px 24px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--rose), var(--violet));
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 20px var(--glow-rose);
      transition: opacity .2s;
    }
    #frame-blocked .fb-btn:hover { opacity: .85; }

    /* ============================================================ 左边缘触发条 */
    #sidebar-trigger {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      width: 18px;
      height: 64px;
      background: linear-gradient(180deg, var(--rose-dim), var(--violet));
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 2px 0 12px rgba(255,92,138,.35);
      transition: width .2s, opacity .2s;
      opacity: .7;
    }
    #sidebar-trigger:hover { width: 22px; opacity: 1; }
    #sidebar-trigger::after {
      content: '›';
      color: rgba(255,255,255,.9);
      font-size: 16px;
      font-weight: 700;
    }
    /* 侧栏展开时隐藏触发条 */
    body.sidebar-open #sidebar-trigger { opacity: 0; pointer-events: none; }

    /* ============================================================ 悬浮侧栏 */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      z-index: 300;
      background: linear-gradient(180deg, rgba(11,16,32,.97) 0%, rgba(8,13,26,.97) 100%);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      padding: 24px 14px 20px;
      transform: translateX(calc(-1 * var(--sidebar-w)));
      transition: transform .28s cubic-bezier(.4,0,.2,1), box-shadow .28s;
      box-shadow: none;
    }
    body.sidebar-open #sidebar {
      transform: translateX(0);
      box-shadow: 4px 0 32px rgba(0,0,0,.6), 0 0 60px rgba(255,92,138,.08);
    }

    /* 顶部光线 */
    #sidebar::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--rose), var(--violet), var(--cyan));
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--rose), var(--violet));
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 14px var(--glow-rose);
    }
    .logo-name {
      font-size: 14px; font-weight: 700;
      background: linear-gradient(90deg, #fff8fa, var(--rose), var(--peach));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-sub { font-size: 10px; color: var(--text-3); margin-top: 2px; }

    /* 导航列表 */
    .nav-list { display: flex; flex-direction: column; gap: 6px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color .2s, box-shadow .2s, transform .15s, background .2s;
      position: relative; overflow: hidden;
    }
    .nav-item:hover,
    .nav-item.active {
      border-color: var(--rose-dim);
      background: var(--bg-card2);
      box-shadow: 0 0 14px rgba(255,92,138,.12), inset 0 0 16px rgba(255,92,138,.04);
      transform: translateX(2px);
    }
    .nav-item.cyan:hover,
    .nav-item.cyan.active {
      border-color: rgba(0,229,255,.4);
      box-shadow: 0 0 14px rgba(0,229,255,.1), inset 0 0 16px rgba(0,229,255,.04);
    }

    /* 激活指示线 */
    .nav-item.active::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px; border-radius: 0 2px 2px 0;
      background: linear-gradient(180deg, var(--rose), var(--violet));
    }
    .nav-item.cyan.active::before {
      background: linear-gradient(180deg, var(--cyan), var(--violet));
    }

    .nav-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .nav-icon.rose {
      background: linear-gradient(135deg, rgba(255,92,138,.22), rgba(167,139,250,.1));
      border: 1px solid rgba(255,92,138,.28);
    }
    .nav-icon.cyan {
      background: linear-gradient(135deg, rgba(0,229,255,.18), rgba(0,184,212,.08));
      border: 1px solid rgba(0,229,255,.28);
    }

    .nav-title { font-size: 13px; font-weight: 600; color: var(--text-1); flex: 1; }
    .nav-arrow { font-size: 11px; color: var(--text-3); flex-shrink: 0; transition: color .2s; }
    .nav-item:hover .nav-arrow { color: var(--rose-soft); }
    .nav-item.cyan:hover .nav-arrow { color: var(--cyan); }
    /* 外链箭头略有区别 */
    .nav-item .ext-icon { font-size: 10px; color: var(--text-3); flex-shrink: 0; }

    /* 底部 */
    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 10px; color: var(--text-3); line-height: 1.7;
    }

    /* 遮罩（侧栏展开时，点击内容区关闭） */
    #sidebar-mask {
      display: none;
      position: fixed; inset: 0; z-index: 250;
      background: rgba(0,0,0,.25);
      backdrop-filter: blur(1px);
    }
    body.sidebar-open #sidebar-mask { display: block; }
  </style>
</head>
<body>

  <!-- iframe 内容区 -->
  <iframe id="main-frame" src="/dashboard" allowfullscreen></iframe>

  <!-- 无法嵌入时的占位 -->
  <div id="frame-blocked">
    <div class="fb-icon">🔒</div>
    <div class="fb-title">该页面不支持嵌入显示</div>
    <div class="fb-desc">此看板的服务器限制了页面嵌入。<br />点击下方按钮在新标签页中打开。</div>
    <button class="fb-btn" id="fb-open-btn">在新标签页中打开 ↗</button>
  </div>

  <!-- 左边缘触发条 -->
  <div id="sidebar-trigger"></div>

  <!-- 点击遮罩关闭侧栏 -->
  <div id="sidebar-mask"></div>

  <!-- 悬浮侧栏 -->
  <aside id="sidebar">
    <div class="logo">
      <div class="logo-icon">🌸</div>
      <div>
        <div class="logo-name">数据看板</div>
        <div class="logo-sub">Dashboard Hub</div>
      </div>
    </div>

    <nav class="nav-list">
      <div class="nav-item active" id="nav-ai" onclick="loadDashboard(this)">
        <div class="nav-icon rose">📊</div>
        <span class="nav-title">AI 吸乳计划看板</span>
        <span class="nav-arrow">›</span>
      </div>

      <div class="nav-item cyan" id="nav-platform" onclick="loadExternal(this)">
        <div class="nav-icon cyan">🔮</div>
        <span class="nav-title">数据平台看板</span>
        <span class="ext-icon">↗</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div>鼠标移出自动收起</div>
    </div>
  </aside>

<script>
const sidebar      = document.getElementById('sidebar');
const trigger      = document.getElementById('sidebar-trigger');
const mask         = document.getElementById('sidebar-mask');
const frame        = document.getElementById('main-frame');
const frameBlocked = document.getElementById('frame-blocked');
const fbOpenBtn    = document.getElementById('fb-open-btn');

let hideTimer = null;
let currentExtUrl = '';

/* ---- 侧栏开关 ---- */
function openSidebar() {
  clearTimeout(hideTimer);
  document.body.classList.add('sidebar-open');
}

function closeSidebar() {
  document.body.classList.remove('sidebar-open');
}

function scheduleClose() {
  clearTimeout(hideTimer);
  hideTimer = setTimeout(closeSidebar, 300);
}

/* 触发条：悬停或点击打开 */
trigger.addEventListener('mouseenter', openSidebar);
trigger.addEventListener('click', openSidebar);

/* 侧栏：鼠标进入取消关闭计时器 */
sidebar.addEventListener('mouseenter', () => clearTimeout(hideTimer));

/* 侧栏：鼠标离开后延迟关闭 */
sidebar.addEventListener('mouseleave', scheduleClose);

/* 点击遮罩关闭 */
mask.addEventListener('click', closeSidebar);

/* ---- 加载内部看板 ---- */
function loadDashboard(el) {
  setActive(el);
  frameBlocked.style.display = 'none';
  frame.style.display = 'block';
  frame.src = '/dashboard';
  scheduleClose();
}

/* ---- 加载外部看板（尝试 iframe，失败则提示新标签页） ---- */
const EXT_URL = 'https://app-data.luteos.site/';

function loadExternal(el) {
  setActive(el);
  currentExtUrl = EXT_URL;
  fbOpenBtn.onclick = () => window.open(currentExtUrl, '_blank', 'noopener');

  /* 先尝试放入 iframe */
  frameBlocked.style.display = 'none';
  frame.style.display = 'block';
  frame.src = EXT_URL;

  /* iframe 加载完成后检测是否被拦截 */
  frame.onload = function () {
    let blocked = false;
    try {
      /* 跨域会抛 SecurityError；若 contentDocument 为 null 通常也是被拦截 */
      if (!frame.contentDocument && !frame.contentWindow?.location?.href) blocked = true;
    } catch (e) {
      /* SecurityError = 跨域但已加载（大概率可以显示）；其他错误视为拦截 */
      blocked = !(e instanceof DOMException && e.name === 'SecurityError');
    }
    if (blocked) showBlocked();
    frame.onload = null;
  };

  /* 5s 后如果 frame 内容为空则也判定为拦截 */
  setTimeout(() => {
    if (frame.src !== EXT_URL) return;
    try {
      if (!frame.contentWindow?.location?.href) showBlocked();
    } catch (_) { /* 跨域正常，不处理 */ }
  }, 5000);

  scheduleClose();
}

function showBlocked() {
  frame.style.display = 'none';
  frameBlocked.style.display = 'flex';
}

/* ---- 激活态切换 ---- */
function setActive(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
