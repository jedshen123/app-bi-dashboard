<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momcozy数据平台</title>
  <style>
    :root {
      --bg-deep:   #060810;
      --bg-card:   #0f1524;
      --bg-card2:  #141c30;
      --border:    #1e2d48;
      --border-hi: #2a4068;
      --rose:      #ff5c8a;
      --rose-soft: #ff8fab;
      --rose-dim:  #b85a78;
      --cyan:      #00e5ff;
      --cyan-dim:  #00b8d4;
      --violet:    #a78bfa;
      --peach:     #f4b8a8;
      --text-1:    #eef2ff;
      --text-2:    #94a8c8;
      --text-3:    #5a6d8a;
      --glow-rose: rgba(255,92,138,.4);
      --glow-cyan: rgba(0,229,255,.3);
      --sidebar-w: 260px;
      --radius:    12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #fafbfc;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
    }

    /* ============================================================ iframe */
    #main-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #fafbfc;
    }

    /* ============================================================ 左边缘触发条 */
    #sidebar-trigger {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      width: 18px;
      height: 64px;
      background: linear-gradient(180deg, var(--rose-dim), var(--violet));
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 2px 0 12px rgba(255,92,138,.35);
      transition: width .2s, opacity .2s;
      opacity: .7;
    }
    #sidebar-trigger:hover { width: 22px; opacity: 1; }
    #sidebar-trigger::after {
      content: '›';
      color: rgba(255,255,255,.9);
      font-size: 16px;
      font-weight: 700;
    }
    /* 侧栏展开时隐藏触发条 */
    body.sidebar-open #sidebar-trigger { opacity: 0; pointer-events: none; }

    /* ============================================================ 悬浮侧栏 */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      z-index: 300;
      background: linear-gradient(180deg, rgba(11,16,32,.97) 0%, rgba(8,13,26,.97) 100%);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      padding: 24px 14px 20px;
      transform: translateX(calc(-1 * var(--sidebar-w)));
      transition: transform .28s cubic-bezier(.4,0,.2,1), box-shadow .28s;
      box-shadow: none;
    }
    body.sidebar-open #sidebar {
      transform: translateX(0);
      box-shadow: 4px 0 32px rgba(0,0,0,.6), 0 0 60px rgba(255,92,138,.08);
    }

    /* 顶部光线 */
    #sidebar::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--rose), var(--violet), var(--cyan));
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      background: rgba(255,255,255,.96);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 14px var(--glow-rose);
      padding: 6px;
      overflow: hidden;
    }
    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .logo-name {
      font-size: 14px; font-weight: 700;
      background: linear-gradient(90deg, #fff8fa, var(--rose), var(--peach));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }
    .logo-sub { font-size: 10px; color: var(--text-3); margin-top: 2px; }

    /* 导航列表 */
    .nav-list { display: flex; flex-direction: column; gap: 6px; }
    .nav-platform-section {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .nav-platform-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .nav-platform-row .nav-item {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px 6px 8px;
      gap: 6px;
      min-height: 72px;
    }
    .nav-platform-row .nav-item:hover,
    .nav-platform-row .nav-item.active {
      transform: none;
    }
    .nav-platform-row .nav-title {
      flex: none;
      font-size: 11px;
      line-height: 1.35;
      width: 100%;
    }
    .nav-platform-row .nav-icon {
      width: 28px;
      height: 28px;
    }
    .nav-platform-row .ext-icon {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 9px;
      opacity: .85;
    }
    .nav-section-label {
      margin: 0 2px 8px;
      color: var(--text-3);
      font-size: 10px;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color .2s, box-shadow .2s, transform .15s, background .2s;
      position: relative; overflow: hidden;
    }
    .nav-item:hover,
    .nav-item.active {
      border-color: var(--rose-dim);
      background: var(--bg-card2);
      box-shadow: 0 0 14px rgba(255,92,138,.12), inset 0 0 16px rgba(255,92,138,.04);
      transform: translateX(2px);
    }
    .nav-item.cyan:hover,
    .nav-item.cyan.active {
      border-color: rgba(0,229,255,.4);
      box-shadow: 0 0 14px rgba(0,229,255,.1), inset 0 0 16px rgba(0,229,255,.04);
    }

    /* 激活指示线 */
    .nav-item.active::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px; border-radius: 0 2px 2px 0;
      background: linear-gradient(180deg, var(--rose), var(--violet));
    }
    .nav-item.cyan.active::before {
      background: linear-gradient(180deg, var(--cyan), var(--violet));
    }

    .nav-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .nav-icon.data-logo {
      background: rgba(20,28,48,.85);
      border: 1px solid var(--border-hi);
      box-shadow: none;
      position: relative;
      color: var(--text-2);
    }
    .nav-icon.data-bars i,
    .nav-icon.data-bars i::before,
    .nav-icon.data-bars i::after {
      display: block;
      width: 4px;
      border-radius: 2px 2px 1px 1px;
      background: currentColor;
      content: '';
    }
    .nav-icon.data-bars i { height: 14px; position: relative; }
    .nav-icon.data-bars i::before {
      position: absolute;
      left: -7px;
      bottom: 0;
      height: 9px;
      opacity: .75;
    }
    .nav-icon.data-bars i::after {
      position: absolute;
      right: -7px;
      bottom: 0;
      height: 18px;
      opacity: .9;
    }
    .nav-icon.data-grid i {
      width: 17px;
      height: 17px;
      border: 1px solid currentColor;
      border-radius: 3px;
      background:
        linear-gradient(currentColor, currentColor) 50% 0 / 1px 100% no-repeat,
        linear-gradient(currentColor, currentColor) 0 50% / 100% 1px no-repeat;
      opacity: .9;
    }
    .nav-icon.data-stack i,
    .nav-icon.data-stack i::before,
    .nav-icon.data-stack i::after {
      display: block;
      height: 4px;
      border: 1px solid currentColor;
      border-radius: 999px;
      content: '';
    }
    .nav-icon.data-stack i {
      width: 18px;
      position: relative;
      opacity: .95;
    }
    .nav-icon.data-stack i::before,
    .nav-icon.data-stack i::after {
      position: absolute;
      left: 1px;
      width: 14px;
    }
    .nav-icon.data-stack i::before { top: -7px; opacity: .7; }
    .nav-icon.data-stack i::after { top: 7px; opacity: .7; }
    .nav-item:hover .nav-icon.data-logo,
    .nav-item.active .nav-icon.data-logo {
      color: var(--text-1);
      border-color: var(--rose-dim);
      background: rgba(20,28,48,.95);
    }

    .nav-title { font-size: 13px; font-weight: 600; color: var(--text-1); flex: 1; }
    .nav-arrow { font-size: 11px; color: var(--text-3); flex-shrink: 0; transition: color .2s; }
    .nav-item:hover .nav-arrow { color: var(--rose-soft); }
    .nav-item.cyan:hover .nav-arrow { color: var(--cyan); }
    /* 外链箭头略有区别 */
    .nav-item .ext-icon { font-size: 10px; color: var(--text-3); flex-shrink: 0; }

    /* 底部用户信息 */
    .sidebar-footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .user-info {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
    }
    .user-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--rose-dim), var(--violet));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .user-name {
      flex: 1; font-size: 12px; font-weight: 600; color: var(--text-1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .btn-logout {
      flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: var(--text-3); font-size: 15px;
      padding: 2px 4px; border-radius: 4px;
      transition: color .18s;
    }
    .btn-logout:hover { color: var(--rose); }

    /* 遮罩（侧栏展开时，点击内容区关闭） */
    #sidebar-mask {
      display: none;
      position: fixed; inset: 0; z-index: 250;
      background: transparent;
    }
    body.sidebar-open #sidebar-mask { display: block; }
  </style>
</head>
<body>

  <!-- iframe 内容区 -->
  <iframe id="main-frame" src="/home.html" allowfullscreen></iframe>

  <!-- 左边缘触发条 -->
  <div id="sidebar-trigger"></div>

  <!-- 点击遮罩关闭侧栏 -->
  <div id="sidebar-mask"></div>

  <!-- 悬浮侧栏 -->
  <aside id="sidebar">
    <div class="logo">
      <div class="logo-icon"><img src="/favicon.png" alt="Momcozy" /></div>
      <div>
        <div class="logo-name">Momcozy数据平台</div>
        <div class="logo-sub">Data Platform</div>
      </div>
    </div>

    <div class="nav-section-label">数据看板</div>
    <nav class="nav-list nav-main">
      <div class="nav-item" id="nav-ai-v2" data-board-id="ai-v2" data-src="/dashboard-v2" onclick="loadDashboard(this)">
        <div class="nav-icon data-logo data-bars"><i></i></div>
        <span class="nav-title">AI吸乳计划分析</span>
        <span class="nav-arrow">›</span>
      </div>

      <div class="nav-item cyan" id="nav-pump" data-board-id="pump" data-src="/pump" onclick="loadDashboard(this)">
        <div class="nav-icon data-logo data-bars"><i></i></div>
        <span class="nav-title">吸奶器用户行为分析</span>
        <span class="nav-arrow">›</span>
      </div>

      <div class="nav-item cyan" id="nav-firmware" data-board-id="firmware" data-src="/firmware" onclick="loadDashboard(this)">
        <div class="nav-icon data-logo data-bars"><i></i></div>
        <span class="nav-title">智能设备固件版本统计</span>
        <span class="nav-arrow">›</span>
      </div>
    </nav>

    <div class="nav-platform-section">
      <div class="nav-section-label">平台入口</div>
      <nav class="nav-list nav-platform-row">
        <a class="nav-item" id="nav-platform" href="https://app-data.luteos.site/" target="_blank" rel="noopener noreferrer" title="数据开发平台">
          <span class="ext-icon" aria-hidden="true">↗</span>
          <div class="nav-icon data-logo data-stack"><i></i></div>
          <span class="nav-title">数据开发平台</span>
        </a>
        <a class="nav-item cyan" id="nav-posthog" href="https://us.posthog.com/" target="_blank" rel="noopener noreferrer" title="PostHog 行为分析">
          <span class="ext-icon" aria-hidden="true">↗</span>
          <div class="nav-icon data-logo data-bars"><i></i></div>
          <span class="nav-title">行为分析平台</span>
        </a>
      </nav>
    </div>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-name" id="user-name">加载中…</div>
        <button class="btn-logout" title="退出登录" onclick="doLogout()">⏻</button>
      </div>
    </div>
  </aside>

<script>
const sidebar = document.getElementById('sidebar');
const trigger = document.getElementById('sidebar-trigger');
const mask    = document.getElementById('sidebar-mask');
const frame   = document.getElementById('main-frame');

const BOARDS = {
  'ai-v2':    { src: '/dashboard-v2', el: '#nav-ai-v2' },
  'pump':     { src: '/pump',          el: '#nav-pump' },
  'firmware': { src: '/firmware',      el: '#nav-firmware' },
};

const HOME_PATHS = new Set(['/', '/home']);

let hideTimer = null;

/* ---- 侧栏开关 ---- */
function openSidebar() {
  clearTimeout(hideTimer);
  document.body.classList.add('sidebar-open');
}

function closeSidebar() {
  document.body.classList.remove('sidebar-open');
}

function scheduleClose() {
  clearTimeout(hideTimer);
  hideTimer = setTimeout(closeSidebar, 300);
}

trigger.addEventListener('mouseenter', openSidebar);
trigger.addEventListener('click', openSidebar);
sidebar.addEventListener('mouseenter', () => clearTimeout(hideTimer));
sidebar.addEventListener('mouseleave', scheduleClose);
mask.addEventListener('click', closeSidebar);

/* ---- URL 路由 ---- */
function boardIdFromPath() {
  const m = location.pathname.match(/^\/board\/([a-z0-9-]+)\/?$/i);
  return m ? m[1] : null;
}

function isHomePath() {
  const p = location.pathname.replace(/\/$/, '') || '/';
  return HOME_PATHS.has(p);
}

function setUrlBoard(boardId, replace) {
  const url = `/board/${boardId}`;
  const state = { view: 'board', boardId };
  if (replace) history.replaceState(state, '', url);
  else history.pushState(state, '', url);
}

function setUrlHome(replace) {
  const state = { view: 'home' };
  if (replace) history.replaceState(state, '', '/home');
  else history.pushState(state, '', '/home');
}

function loadFrameSrc(src) {
  frame.src = src + (src.includes('?') ? '&' : '?') + '_t=' + Date.now();
}

function loadBoard(boardId, { replace = false, skipUrl = false } = {}) {
  const board = BOARDS[boardId];
  if (!board) return;
  const el = document.querySelector(board.el);
  if (el) setActive(el);
  loadFrameSrc(board.src);
  closeSidebar();
  if (!skipUrl) setUrlBoard(boardId, replace);
}

function loadHome({ replace = false, skipUrl = false, openNav = false } = {}) {
  document.querySelectorAll('.nav-main .nav-item').forEach(n => n.classList.remove('active'));
  loadFrameSrc('/home.html');
  if (openNav) openSidebar();
  if (!skipUrl) setUrlHome(replace);
}

/* ---- 加载内部看板 ---- */
function loadDashboard(el) {
  const boardId = el.dataset.boardId;
  if (boardId && BOARDS[boardId]) {
    loadBoard(boardId);
    return;
  }
  setActive(el);
  loadFrameSrc(el.dataset.src || '/dashboard');
  closeSidebar();
}

function loadDashboardByBoardId(boardId) {
  if (BOARDS[boardId]) loadBoard(boardId);
}

function loadDashboardBySrc(src) {
  const boardId = Object.keys(BOARDS).find(id => BOARDS[id].src === src);
  if (boardId) {
    loadBoard(boardId);
    return;
  }
  const el = document.querySelector(`.nav-main .nav-item[data-src="${src}"]`);
  if (el) setActive(el);
  loadFrameSrc(src);
  closeSidebar();
}

/* ---- 激活态切换 ---- */
function setActive(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

window.addEventListener('message', event => {
  if (event.data?.type !== 'momcozy-open-dashboard') return;
  if (event.data.boardId) loadDashboardByBoardId(event.data.boardId);
  else if (event.data.src) loadDashboardBySrc(event.data.src);
});

window.addEventListener('popstate', () => {
  const boardId = boardIdFromPath();
  if (boardId && BOARDS[boardId]) {
    loadBoard(boardId, { skipUrl: true });
    return;
  }
  loadHome({ skipUrl: true, openNav: isHomePath() });
});

/* ---- 启动：按 URL 恢复看板或展示首页 ---- */
function init() {
  const boardId = boardIdFromPath();
  if (boardId && BOARDS[boardId]) {
    loadBoard(boardId, { replace: true, skipUrl: true });
    return;
  }
  if (isHomePath()) {
    loadHome({ replace: location.pathname === '/', skipUrl: location.pathname === '/home', openNav: true });
    return;
  }
  loadHome({ replace: true });
}

/* ---- 用户信息 ---- */
async function loadUser() {
  try {
    const res = await fetch('/api/me');
    if (res.status === 401) { location.replace('/login'); return; }
    const data = await res.json();
    const name = data.first_name || data.email || '用户';
    document.getElementById('user-name').textContent = name;
    document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
  } catch (_) {}
}

/* ---- 登出 ---- */
async function doLogout() {
  await fetch('/logout');
  location.replace('/login');
}

loadUser();
init();
</script>
</body>
</html>
