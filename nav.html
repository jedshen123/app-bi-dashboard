<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据看板导航</title>
  <style>
    :root {
      --bg-deep:   #060810;
      --bg-page:   #0a0e18;
      --bg-card:   #0f1524;
      --bg-card2:  #141c30;
      --border:    #1e2d48;
      --border-hi: #2a4068;
      --rose:      #ff5c8a;
      --rose-soft: #ff8fab;
      --rose-dim:  #b85a78;
      --cyan:      #00e5ff;
      --cyan-dim:  #00b8d4;
      --violet:    #a78bfa;
      --magenta:   #e879f9;
      --mint:      #34d399;
      --peach:     #f4b8a8;
      --text-1:    #eef2ff;
      --text-2:    #94a8c8;
      --text-3:    #5a6d8a;
      --glow-rose: rgba(255,92,138,.4);
      --glow-cyan: rgba(0,229,255,.3);
      --sidebar-w: 260px;
      --radius:    12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: var(--bg-deep);
      color: var(--text-1);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* 全局顶部光线 */
    body::after {
      content: ''; position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 100;
      background: linear-gradient(90deg, transparent, var(--rose), var(--cyan), var(--violet), transparent);
    }

    /* ============================================================ 左侧栏 */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      height: 100vh;
      background: linear-gradient(180deg, #0b1020 0%, #080d1a 100%);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px 20px;
      position: relative;
      overflow-y: auto;
    }

    /* 侧栏竖线装饰 */
    .sidebar::before {
      content: '';
      position: absolute;
      top: 80px; bottom: 80px;
      right: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--rose-dim), var(--cyan-dim), transparent);
      opacity: .35;
    }

    /* Logo 区 */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--rose), var(--violet));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px var(--glow-rose);
      flex-shrink: 0;
    }
    .logo-name {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(90deg, #fff8fa, var(--rose), var(--peach));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: .3px;
    }
    .logo-sub {
      font-size: 10px;
      color: var(--text-3);
      margin-top: 2px;
    }

    /* 导航卡片 */
    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .nav-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,92,138,.05), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .nav-item:hover {
      border-color: var(--rose-dim);
      box-shadow: 0 0 18px rgba(255,92,138,.15), inset 0 0 20px rgba(255,92,138,.04);
      transform: translateX(3px);
    }
    .nav-item:hover::before { opacity: 1; }

    .nav-item.cyan:hover {
      border-color: rgba(0,229,255,.4);
      box-shadow: 0 0 18px rgba(0,229,255,.12), inset 0 0 20px rgba(0,229,255,.04);
    }
    .nav-item.cyan::before {
      background: linear-gradient(135deg, rgba(0,229,255,.05), transparent);
    }

    .nav-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .nav-icon.rose {
      background: linear-gradient(135deg, rgba(255,92,138,.25), rgba(167,139,250,.15));
      border: 1px solid rgba(255,92,138,.3);
    }
    .nav-icon.cyan {
      background: linear-gradient(135deg, rgba(0,229,255,.2), rgba(0,184,212,.1));
      border: 1px solid rgba(0,229,255,.3);
    }

    .nav-text { flex: 1; min-width: 0; }
    .nav-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-arrow {
      font-size: 12px;
      color: var(--text-3);
      flex-shrink: 0;
      transition: color .2s;
    }
    .nav-item:hover .nav-arrow { color: var(--rose-soft); }
    .nav-item.cyan:hover .nav-arrow { color: var(--cyan); }

    /* 底部版本信息 */
    .sidebar-footer {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-3);
      line-height: 1.6;
    }

    /* ============================================================ 右侧内容区 */
    .main {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      background:
        radial-gradient(ellipse 70% 50% at 20% 10%, rgba(255,92,138,.07), transparent 55%),
        radial-gradient(ellipse 50% 40% at 85% 15%, rgba(0,229,255,.05), transparent 50%),
        var(--bg-page);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 48px;
      position: relative;
    }

    /* 背景网格 */
    .main::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .main-inner {
      position: relative;
      z-index: 1;
      max-width: 580px;
      width: 100%;
      text-align: center;
    }

    .hero-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--rose), var(--violet));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 40px var(--glow-rose), 0 0 80px rgba(255,92,138,.15);
      margin: 0 auto 28px;
    }

    .hero-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: .5px;
      background: linear-gradient(90deg, #fff, var(--rose-soft), var(--peach));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .hero-desc {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.8;
      margin-bottom: 40px;
    }

    /* 快捷卡片网格 */
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 36px;
    }

    .quick-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      text-decoration: none;
      color: inherit;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .quick-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .quick-card.rose::before {
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
    }
    .quick-card.cyan::before {
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }
    .quick-card:hover {
      transform: translateY(-3px);
    }
    .quick-card.rose:hover {
      border-color: rgba(255,92,138,.45);
      box-shadow: 0 8px 32px rgba(255,92,138,.15);
    }
    .quick-card.cyan:hover {
      border-color: rgba(0,229,255,.4);
      box-shadow: 0 8px 32px rgba(0,229,255,.1);
    }

    .qc-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .qc-icon.rose {
      background: linear-gradient(135deg, rgba(255,92,138,.25), rgba(167,139,250,.1));
      border: 1px solid rgba(255,92,138,.35);
    }
    .qc-icon.cyan {
      background: linear-gradient(135deg, rgba(0,229,255,.2), rgba(0,184,212,.08));
      border: 1px solid rgba(0,229,255,.3);
    }

    .qc-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
    }
    .qc-desc {
      font-size: 11px;
      color: var(--text-3);
      line-height: 1.5;
      text-align: left;
    }

    .hint {
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .hint-icon { font-size: 14px; }

    @media (max-width: 700px) {
      .sidebar { width: 220px; }
      :root { --sidebar-w: 220px; }
      .quick-grid { grid-template-columns: 1fr; }
      .main { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <!-- 左侧导航栏 -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🌸</div>
      <div>
        <div class="logo-name">数据看板中心</div>
        <div class="logo-sub">Data Dashboard Hub</div>
      </div>
    </div>

    <nav class="nav-list">
      <a class="nav-item"
         href="/dashboard"
         target="_blank" rel="noopener">
        <div class="nav-icon rose">📊</div>
        <div class="nav-text">
          <div class="nav-title">AI 吸乳计划看板</div>
        </div>
        <span class="nav-arrow">↗</span>
      </a>

      <a class="nav-item cyan"
         href="https://app-data.luteos.site/"
         target="_blank" rel="noopener">
        <div class="nav-icon cyan">🔮</div>
        <div class="nav-text">
          <div class="nav-title">数据平台看板</div>
        </div>
        <span class="nav-arrow">↗</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div>Dashboard Hub</div>
      <div style="margin-top:4px;color:var(--text-3)">点击链接在新标签页打开</div>
    </div>
  </aside>

  <!-- 右侧内容区 -->
  <main class="main">
    <div class="main-inner">
      <div class="hero-icon">📈</div>
      <div class="hero-title">数据看板导航</div>
      <p class="hero-desc">
        从左侧选择看板，点击后将在新标签页中打开。<br />
        所有看板均为实时数据，建议使用桌面端浏览器访问。
      </p>

      <div class="quick-grid">
        <a class="quick-card rose"
           href="/dashboard"
           target="_blank" rel="noopener">
          <div class="qc-icon rose">📊</div>
          <div class="qc-title">AI 吸乳计划看板</div>
          <div class="qc-desc">吸乳计划功能核心指标、趋势分析及漏斗转化数据</div>
        </a>

        <a class="quick-card cyan"
           href="https://app-data.luteos.site/"
           target="_blank" rel="noopener">
          <div class="qc-icon cyan">🔮</div>
          <div class="qc-title">数据平台看板</div>
          <div class="qc-desc">Metabase 数据平台，支持多维度业务数据查询与可视化</div>
        </a>
      </div>

      <p class="hint">
        <span class="hint-icon">💡</span>
        链接将在新标签页打开，不影响当前导航页
      </p>
    </div>
  </main>

</body>
</html>
